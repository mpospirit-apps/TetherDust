# Frontend static server — serves the compiled SPA with a client-side routing
# fallback. This container has NO backend/proxy knowledge; the public `nginx`
# gateway routes /api + /ws to the backend and everything else here.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
