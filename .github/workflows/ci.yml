name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  version-bump:
    name: Version Bump Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check VERSION is strictly greater than main
        id: version
        run: |
          MAIN_VERSION=$(git show origin/main:VERSION)
          PR_VERSION=$(cat VERSION)
          python3 - <<EOF
          from packaging.version import Version
          main = Version("$MAIN_VERSION")
          pr   = Version("$PR_VERSION")
          if pr <= main:
              print(f"ERROR: VERSION must be strictly greater than main ({main}). Got: {pr}")
              raise SystemExit(1)
          print(f"OK: {main} → {pr}")
          EOF
          echo "pr_version=$PR_VERSION" >> $GITHUB_OUTPUT

      - name: Check changelog file exists
        run: |
          VERSION="${{ steps.version.outputs.pr_version }}"
          if [ ! -f "changelog/$VERSION.md" ]; then
            echo "ERROR: changelog/$VERSION.md not found. Add it before merging."
            exit 1
          fi
          echo "OK: changelog/$VERSION.md exists"


  lint:
    name: Lint & Format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check tdmcp/ backend/ docker/

      - name: Ruff format check
        run: ruff format --check tdmcp/ backend/ docker/

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install all dependencies
        run: pip install -e ".[all-databases,web,dev]"

      - name: Mypy
        run: mypy --show-traceback tdmcp/ backend/ docker/
        env:
          PYTHONPATH: backend
          DJANGO_SECRET_KEY: "ci-dummy-secret-key-for-static-analysis-checks"

  pyrefly:
    name: Pyrefly
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies for Pyrefly (include web & DB extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all-databases,web,dev]"

      - name: Pyrefly check
        run: pyrefly check --python-interpreter-path $(which python) --summarize-errors
        env:
          PYTHONPATH: backend
          DJANGO_SECRET_KEY: "ci-dummy-secret-key-for-static-analysis-checks"

  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install all dependencies
        run: pip install -e ".[all-databases,web,dev]"

      - name: Pytest with coverage
        run: pytest tests/ --cov --cov-report=term-missing --tb=short
