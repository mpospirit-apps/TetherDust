name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tetherdust

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: tetherdust/pyproject.toml

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tetherdust

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: tetherdust/pyproject.toml

      - name: Install all dependencies
        run: pip install -e ".[all-databases,web,dev]"

      - name: Mypy
        run: mypy .

  test:
    name: Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tetherdust

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: tetherdust/pyproject.toml

      - name: Install all dependencies
        run: pip install -e ".[all-databases,web,dev]"

      - name: Pytest with coverage
        run: pytest --cov --cov-report=term-missing --tb=short
