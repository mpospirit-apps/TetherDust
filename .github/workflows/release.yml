name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    name: Auto-release on VERSION bump
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if VERSION changed
        id: check
        run: |
          BEFORE="${{ github.event.before }}"
          # Zero hash = branch was just created; nothing to diff
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          if git diff --name-only "$BEFORE" "${{ github.sha }}" | grep -q '^VERSION$'; then
            VERSION=$(cat VERSION)
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Validate tag and changelog
        id: validate
        if: steps.check.outputs.changed == 'true'
        run: |
          VERSION="${{ steps.check.outputs.version }}"
          TAG="v$VERSION"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists — skipping release."
            echo "already_tagged=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ ! -f "changelog/$VERSION.md" ]; then
            echo "ERROR: changelog/$VERSION.md not found."
            exit 1
          fi

      - name: Create tag and GitHub release
        if: steps.check.outputs.changed == 'true' && steps.validate.outputs.already_tagged != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.check.outputs.version }}"
          TAG="v$VERSION"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

          gh release create "$TAG" --title "$TAG" --notes-file "changelog/$VERSION.md"
