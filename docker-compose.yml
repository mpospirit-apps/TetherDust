services:
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5

  tdmcp:
    build:
      context: .
      dockerfile: containers/tdmcp/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8001
      - TETHERDUST_DOCUMENTATIONS_DIR=/app/sources/docs
      - TETHERDUST_CODEBASES_DIR=/app/sources/codebases
      - ADMIN_DATABASE_URL=postgresql+psycopg2://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      - TETHERDUST_ENCRYPTION_KEY=${TETHERDUST_ENCRYPTION_KEY}
      # Shared secret authenticating filter registration from backend/celery.
      - MCP_FILTER_SECRET=${MCP_FILTER_SECRET}
      # Mutating tools (create_dashboard/add_chart/update_chart/save_tether_graph)
      # write via the backend internal API instead of raw SQL.
      - BACKEND_INTERNAL_API_URL=http://backend:8000/api/internal
      - INTERNAL_API_SERVICE_TOKEN=${INTERNAL_API_SERVICE_TOKEN}
      # Semantic search for local codebases (search_codebase → ccc service).
      - CCC_SERVICE_URL=http://ccc:8004
      - AGENT_GATEWAY_SECRET=${AGENT_GATEWAY_SECRET}
    volumes:
      - ./tdmcp:/app/tdmcp
      - ./sources/docs:/app/sources/docs
      # Local codebases are read live from disk by the codebase MCP tools.
      - ./sources/codebases:/app/sources/codebases:ro
      # SQLite connection files. Read-only: TetherDust only ever queries them.
      - ./sources/databases:/app/sources/databases:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/healthz')"]
      interval: 15s
      timeout: 5s
      start_period: 15s
      retries: 3

  local-mcp:
    build:
      context: .
      dockerfile: containers/local_mcp/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+psycopg2://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      - TETHERDUST_ENCRYPTION_KEY=${TETHERDUST_ENCRYPTION_KEY}
      - LOCAL_MCP_PORT=8003
    healthcheck:
      test: ["CMD", "/opt/local-mcp/bin/python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/healthz')"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3

  # Semantic-search service (cocoindex-code) behind a FastAPI wrapper. Indexes and
  # searches content under ./sources — local codebases today (sources/codebases),
  # reusable for docs/other domains later. Owns torch + the embedding model + the
  # on-disk index; called over HTTP by tdmcp (search) and backend/celery (index).
  # Deliberately NOT a backend dependency: if it's down, local codebases stay
  # browsable/readable and only semantic search is unavailable.
  ccc:
    build:
      context: .
      dockerfile: containers/ccc/Dockerfile
    environment:
      - CCC_API_PORT=8004
      - LOG_LEVEL=INFO
      # Shared secret authenticating tdmcp/backend → ccc calls.
      - AGENT_GATEWAY_SECRET=${AGENT_GATEWAY_SECRET}
    volumes:
      # rw: ccc writes its index into <project>/.cocoindex_code under sources/.
      - ./sources:/app/sources
    healthcheck:
      test: ["CMD", "/opt/ccc-venv/bin/python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/healthz')"]
      interval: 15s
      timeout: 5s
      start_period: 45s
      retries: 3

  codex:
    build:
      context: .
      dockerfile: containers/codex/Dockerfile
    environment:
      - MCP_URL=http://tdmcp:8001/mcp
      - MCP_BASE_URL=http://tdmcp:8001
      - CODEX_API_PORT=8002
      - CODEX_HOME_DIR=/var/codex-home/.codex
      - LOG_LEVEL=DEBUG
      # Shared secret authenticating Django → gateway calls.
      - AGENT_GATEWAY_SECRET=${AGENT_GATEWAY_SECRET}
      # Sandbox for the agent's shell commands. "danger-full-access" disables it
      # (escape hatch for hosts without Landlock/seccomp support).
      - CODEX_SANDBOX_MODE=${CODEX_SANDBOX_MODE:-read-only}
    volumes:
      # Persistent "live working copy" of the Codex credential. Codex refreshes
      # the session token in place here; per-request homes are seeded from and
      # harvested back to this volume. Never written under /root.
      - codex-home:/var/codex-home
    depends_on:
      tdmcp:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/opt/codex-api/bin/python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/healthz')"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3

  # Codex CLI authenticated by an OpenAI API key (per-token billing).
  # Reuses the codex gateway image; the key is supplied per-request from the
  # encrypted AgentConfiguration._api_key. No volume: API-key auth needs no
  # persistent auth.json.
  #
  # Runs by default (no profile) so switching the active agent to a codex_api
  # agent is a seamless DB flip — the container is already up. Idle cost is just
  # the FastAPI wrapper (~50–80 MB). Deliberately NOT in `backend`'s depends_on: an
  # unhealthy/missing agent must surface as a runtime "service unavailable",
  # never block backend startup.
  codex-api:
    build:
      context: .
      dockerfile: containers/codex/Dockerfile
    environment:
      - MCP_URL=http://tdmcp:8001/mcp
      - MCP_BASE_URL=http://tdmcp:8001
      - CODEX_API_PORT=8002
      - CODEX_HOME_DIR=/var/codex-home/.codex
      - LOG_LEVEL=DEBUG
      # Shared secret authenticating Django → gateway calls.
      - AGENT_GATEWAY_SECRET=${AGENT_GATEWAY_SECRET}
      # Sandbox for the agent's shell commands. "danger-full-access" disables it
      # (escape hatch for hosts without Landlock/seccomp support).
      - CODEX_SANDBOX_MODE=${CODEX_SANDBOX_MODE:-read-only}
    depends_on:
      tdmcp:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/opt/codex-api/bin/python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/healthz')"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3

  # Claude Code CLI authenticated by a subscription
  # OAuth token (Claude Pro/Max). Reuses the same gateway contract as codex; the
  # token is supplied per request from the encrypted AgentConfiguration._auth_token
  # (no persistent volume — OAuth auth needs no auth.json on disk).
  #
  # Runs by default (no profile) so switching the active agent between Codex and
  # Claude in the management is a seamless DB flip — the target container is already
  # up and healthy. Idle cost is just the FastAPI wrapper (~50–80 MB). It is
  # deliberately NOT in `backend`'s depends_on: an unhealthy/missing agent must
  # surface as a runtime "service unavailable", never block backend startup.
  claude:
    build:
      context: .
      dockerfile: containers/claude/Dockerfile
    environment:
      - MCP_URL=http://tdmcp:8001/mcp
      - MCP_BASE_URL=http://tdmcp:8001
      - CLAUDE_API_PORT=8002
      - LOG_LEVEL=DEBUG
      # Shared secret authenticating Django → gateway calls.
      - AGENT_GATEWAY_SECRET=${AGENT_GATEWAY_SECRET}
    depends_on:
      tdmcp:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/opt/claude-api/bin/python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/healthz')"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3

  # Claude Code CLI authenticated by an Anthropic API
  # key (per-token billing). Reuses the same Claude gateway image; the key is
  # supplied per request from the encrypted AgentConfiguration._api_key and
  # injected as ANTHROPIC_API_KEY for the `claude -p` subprocess. No persistent
  # volume — API-key auth needs no credential on disk.
  #
  # Runs by default (no profile) so switching the active agent to a
  # claude_code_api agent is a seamless DB flip — the container is already up.
  # Idle cost is just the FastAPI wrapper (~50–80 MB). Deliberately NOT in
  # `backend`'s depends_on: an unhealthy/missing agent must surface as a runtime
  # "service unavailable", never block backend startup.
  claude-api:
    build:
      context: .
      dockerfile: containers/claude/Dockerfile
    environment:
      - MCP_URL=http://tdmcp:8001/mcp
      - MCP_BASE_URL=http://tdmcp:8001
      - CLAUDE_API_PORT=8002
      - LOG_LEVEL=DEBUG
      # Shared secret authenticating Django → gateway calls.
      - AGENT_GATEWAY_SECRET=${AGENT_GATEWAY_SECRET}
    depends_on:
      tdmcp:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/opt/claude-api/bin/python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/healthz')"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3

  # Local LLM with Ollama (self-hosted, OpenAI-compatible API). The
  # OllamaAgent (a Direct API agent) reaches it at http://ollama:11434/v1.
  # Optional and profile-gated — NOT a backend dependency, so leaving the profile off
  # never blocks startup. Start with `docker compose --profile ollama up -d`, then
  # pull a tool-call-capable model: `docker compose exec ollama ollama pull llama3.1`.
  ollama:
    image: ollama/ollama:latest
    profiles: ["ollama"]
    volumes:
      - ollama-models:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3
    # GPU (Linux + NVIDIA only; ignored on macOS, where Docker has no GPU access
    # and inference runs CPU-only):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - {driver: nvidia, count: all, capabilities: [gpu]}

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    # Internal-only: the nginx gateway is the single public origin and proxies
    # /api + /ws/ to backend:8000. No host port is published.
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    depends_on:
      db:
        condition: service_healthy
      tdmcp:
        condition: service_healthy
      codex:
        condition: service_healthy
      local-mcp:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # Mount backend source for development (live code changes)
      - ./backend:/app/backend
      - ./tdmcp:/app/tdmcp
      - ./sources/docs:/app/sources/docs:ro
      # Read-only: the codebases admin lists/validates local folders here.
      - ./sources/codebases:/app/sources/codebases:ro
      # SQLite connection files, for the admin "Test" button and reports.
      - ./sources/databases:/app/sources/databases:ro
      - report-results:/app/report_results
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      # Debug mode + allowed hosts are configured in .env (see .env.example).
      # The :-false fallback keeps the deploy secure if the var is ever unset.
      - DJANGO_DEBUG=${DJANGO_DEBUG:-false}
      # `backend` is appended so the in-network internal API call (tdmcp →
      # http://backend:8000/api/internal) passes Django's Host header check.
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1},backend
      # On-prem deployments run without a TLS proxy, so disable Django's HTTP→HTTPS
      # redirect. Users who terminate TLS at a reverse proxy should set this to true.
      - DJANGO_SECURE_SSL_REDIRECT=${DJANGO_SECURE_SSL_REDIRECT:-false}
      - DJANGO_SUPERUSER_USERNAME=${DJANGO_SUPERUSER_USERNAME}
      - DJANGO_SUPERUSER_PASSWORD=${DJANGO_SUPERUSER_PASSWORD}
      - DJANGO_SUPERUSER_EMAIL=${DJANGO_SUPERUSER_EMAIL}
      - TETHERDUST_ENCRYPTION_KEY=${TETHERDUST_ENCRYPTION_KEY}
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - CODEX_SERVICE_URL=http://codex:8002
      # Fallback service URL for the API-key Codex agent (codex-api service).
      # Used when its AgentConfiguration.service_url is left blank.
      - CODEX_API_SERVICE_URL=http://codex-api:8002
      # Fallback service URL for the Claude Code agent (claude service).
      # Used when its AgentConfiguration.service_url is left blank.
      - CLAUDE_SERVICE_URL=http://claude:8002
      # Fallback service URL for the API-key Claude Code agent (claude-api service).
      # Used when its AgentConfiguration.service_url is left blank.
      - CLAUDE_API_SERVICE_URL=http://claude-api:8002
      - MCP_BASE_URL=http://tdmcp:8001
      - LOCAL_MCP_BASE_URL=http://local-mcp:8003
      # ccc semantic-search service (indexing local codebases on sync).
      - CCC_SERVICE_URL=http://ccc:8004
      # Shared secrets: filter registration (→ mcp) and gateway calls (→ codex/claude/ccc).
      - MCP_FILTER_SECRET=${MCP_FILTER_SECRET}
      - AGENT_GATEWAY_SECRET=${AGENT_GATEWAY_SECRET}
      # Shared secret authenticating the internal service API (tdmcp → backend).
      - INTERNAL_API_SERVICE_TOKEN=${INTERNAL_API_SERVICE_TOKEN}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - TETHERDUST_REPORT_RESULTS_DIR=/app/report_results

  # Frontend container: builds the React SPA and serves the static bundle via its
  # own nginx (internal :80). No backend/proxy knowledge — the gateway routes to it.
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    expose:
      - "80"

  # Public gateway (single origin, :8000): routes /api + /ws/ to the backend
  # (Daphne) and everything else to the frontend static server. This is the only
  # public entry point — the backend is internal-only.
  nginx:
    build:
      context: ./containers/nginx
      dockerfile: Dockerfile
    ports:
      - "8000:80"
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app/backend
    entrypoint: []
    command: celery -A project worker -l info --concurrency=2
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - ./tdmcp:/app/tdmcp
      # SQLite connection files, for report execution against sqlite sources.
      - ./sources/databases:/app/sources/databases:ro
      - report-results:/app/report_results
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - TETHERDUST_ENCRYPTION_KEY=${TETHERDUST_ENCRYPTION_KEY}
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - TETHERDUST_REPORT_RESULTS_DIR=/app/report_results
      # Worker runs agent-driven jobs (reports/charts/docs) + the Codex token sync
      # + codebase sync (local codebases → ccc index).
      - MCP_FILTER_SECRET=${MCP_FILTER_SECRET}
      - AGENT_GATEWAY_SECRET=${AGENT_GATEWAY_SECRET}
      - CCC_SERVICE_URL=http://ccc:8004

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app/backend
    entrypoint: []
    command: celery -A project beat -l info --pidfile=
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - ./tdmcp:/app/tdmcp
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - TETHERDUST_ENCRYPTION_KEY=${TETHERDUST_ENCRYPTION_KEY}
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0

volumes:
  postgres-data:
  codex-home:
  redis-data:
  report-results:
  ollama-models:
