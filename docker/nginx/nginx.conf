# Public gateway (single origin): routes the API + WebSocket to the backend
# (Daphne) and every other request to the frontend static server. The full Host
# header (including the port) is forwarded via $http_host — NOT $host, which
# strips the port — so Django's CSRF Origin check matches request.get_host() and
# session-cookie auth works without CORS.

server {
    listen 80;
    server_name _;

    # Internal service API (tdmcp → backend) is in-network only: tdmcp reaches it
    # directly at http://backend:8000/api/internal, never through this public
    # gateway. Block it here so the service-token write endpoints aren't exposed
    # on the public origin. (More specific prefix wins over /api/ below.)
    location /api/internal/ {
        return 404;
    }

    # REST API → backend (Django / DRF)
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket → backend (Django Channels: chat / chart-edit consumers)
    location /ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Everything else → frontend static server (SPA).
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
