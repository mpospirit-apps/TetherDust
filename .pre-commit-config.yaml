# Pre-commit hooks for TetherDust.
#
#   pip install pre-commit
#   pre-commit install            # enable on every git commit
#   pre-commit run --all-files    # run against the whole repo once
#
# Requires the full dev environment: pip install -e ".[all-databases,web,dev]"
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: ^docker-compose\.ci\.yml$
      - id: check-toml
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-added-large-files
        args: ["--maxkb=2048"]
        # Demo GIFs in the docs are intentionally large.
        exclude: ^docs/images/.*\.gif$

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.17
    hooks:
      - id: ruff-check
        args: [--fix]
        files: ^(backend|docker|tdmcp|tests)/
      - id: ruff-format
        files: ^(backend|docker|tdmcp|tests)/

  - repo: local
    hooks:
      - id: biome
        name: Biome (frontend lint + format)
        # Runs on the whole frontend (auto-discovers frontend/biome.json) when any
        # frontend file is staged. Requires `npm ci` in frontend/ for local hooks.
        entry: bash -c 'cd frontend && npx biome check --write .'
        language: system
        files: ^frontend/
        pass_filenames: false

      - id: vitest
        name: Vitest (frontend tests)
        # Runs the full Vitest suite when any frontend file is staged.
        # Requires `npm ci` in frontend/ for local hooks.
        entry: bash -c 'cd frontend && npm run test'
        language: system
        files: ^frontend/
        pass_filenames: false

  - repo: local
    hooks:
      - id: pyrefly
        name: Pyrefly
        entry: pyrefly check
        language: system
        types: [python]
        pass_filenames: false

      - id: mypy
        name: Mypy
        entry: .venv/bin/mypy tdmcp/ backend/ containers/
        language: system
        types: [python]
        pass_filenames: false

      - id: pytest
        name: Pytest
        entry: .venv/bin/pytest tests/
        language: system
        types: [python]
        pass_filenames: false
