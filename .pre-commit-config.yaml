# Pre-commit hooks for TetherDust.
#
#   pip install pre-commit
#   pre-commit install            # enable on every git commit
#   pre-commit run --all-files    # run against the whole repo once
#
# Requires the full dev environment: pip install -e ".[all-databases,web,dev]"
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: ^docker-compose\.ci\.yml$
      - id: check-toml
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-added-large-files
        args: ["--maxkb=2048"]
        # Demo GIFs in the docs are intentionally large.
        exclude: ^docs/images/.*\.gif$

  # Backend Python tooling runs through uv so the lockfile is the single source of
  # truth for tool versions — mirroring the frontend running Biome/Vitest from its
  # npm lockfile. `--no-sync` uses the already-synced .venv and never mutates it
  # (contributors run `uv sync --all-extras` once; see CONTRIBUTING).
  - repo: local
    hooks:
      - id: ruff-check
        name: Ruff lint
        entry: uv run --no-sync ruff check --fix
        language: system
        types_or: [python, pyi]
        files: ^(backend|containers|tdmcp|tests)/
      - id: ruff-format
        name: Ruff format
        entry: uv run --no-sync ruff format
        language: system
        types_or: [python, pyi]
        files: ^(backend|containers|tdmcp|tests)/

  - repo: local
    hooks:
      - id: biome
        name: Biome (frontend lint + format)
        # Runs on the whole frontend (auto-discovers frontend/biome.json) when any
        # frontend file is staged. Requires `npm ci` in frontend/ for local hooks.
        entry: bash -c 'cd frontend && npx biome check --write .'
        language: system
        files: ^frontend/
        pass_filenames: false

      - id: vitest
        name: Vitest (frontend tests)
        # Runs the full Vitest suite when any frontend file is staged.
        # Requires `npm ci` in frontend/ for local hooks.
        entry: bash -c 'cd frontend && npm run test'
        language: system
        files: ^frontend/
        pass_filenames: false

  - repo: local
    hooks:
      - id: pyrefly
        name: Pyrefly
        entry: uv run --no-sync pyrefly check
        language: system
        types: [python]
        pass_filenames: false

      - id: mypy
        name: Mypy
        entry: uv run --no-sync mypy tdmcp/ backend/ containers/
        language: system
        types: [python]
        pass_filenames: false

      - id: pytest
        name: Pytest
        entry: uv run --no-sync pytest tests/
        language: system
        types: [python]
        pass_filenames: false
