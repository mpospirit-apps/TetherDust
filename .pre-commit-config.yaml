# Pre-commit hooks for TetherDust.
#
#   pip install pre-commit
#   pre-commit install            # enable on every git commit
#   pre-commit run --all-files    # run against the whole repo once
#
# Requires the full dev environment: pip install -e ".[all-databases,web,dev]"
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: ^docker-compose\.ci\.yml$
      - id: check-toml
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-added-large-files
        args: ["--maxkb=2048"]
        # Demo GIFs in the docs are intentionally large.
        exclude: ^docs/images/.*\.gif$

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.17
    hooks:
      - id: ruff-check
        args: [--fix]
        files: ^(web|docker|tdmcp)/
      - id: ruff-format
        files: ^(web|docker|tdmcp)/

  - repo: local
    hooks:
      - id: pyrefly
        name: Pyrefly
        entry: pyrefly check
        language: system
        types: [python]
        pass_filenames: false

      - id: mypy
        name: Mypy
        entry: .venv/bin/mypy tdmcp/ web/ docker/
        language: system
        types: [python]
        pass_filenames: false

      - id: pytest
        name: Pytest
        entry: .venv/bin/pytest tests/
        language: system
        types: [python]
        pass_filenames: false
